services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finance-app

  redis:
    image: redis:7-alpine
    container_name: finance-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-app

  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-laravel
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance-app

  vite:
    image: node:20-alpine
    container_name: finance-vite
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      TZ: America/Sao_Paulo
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    networks:
      - finance-app

volumes:
  pgdata:
  redisdata:
  vendor:
  node_modules:

networks:
  finance-app:
    driver: bridge
