name: ${COMPOSE_PROJECT_NAME:-finance-app}

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-finance-app}-postgres
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - finance-app

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-finance-app}-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - finance-app

  laravel:
    build:
      context: ${BACKEND_PATH:-./backend}
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-finance-app}-laravel
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "${LARAVEL_PORT:-8000}:8000"
    volumes:
      - ${BACKEND_PATH:-./backend}:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance-app

  worker:
    build:
      context: ${BACKEND_PATH:-./backend}
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-finance-app}-worker
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - ${BACKEND_PATH:-./backend}:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance-app
    restart: unless-stopped

  scheduler:
    build:
      context: ${BACKEND_PATH:-./backend}
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-finance-app}-scheduler
    command: ["php", "artisan", "schedule:work"]
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - ${BACKEND_PATH:-./backend}:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance-app
    restart: unless-stopped

  vite:
    image: node:20-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-finance-app}-vite
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      TZ: America/Sao_Paulo
      CHOKIDAR_USEPOLLING: "true"
      API_TARGET: "http://${COMPOSE_PROJECT_NAME:-finance-app}-laravel:8000"
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ${FRONTEND_PATH:-./frontend}:/app
      - node_modules:/app/node_modules
    networks:
      - finance-app

volumes:
  pgdata:
  redisdata:
  vendor:
  node_modules:

networks:
  finance-app:
    driver: bridge
